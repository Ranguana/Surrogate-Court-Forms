<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login — Probate Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 48px 40px;
      width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      text-align: center;
    }
    h1 { font-size: 20px; margin-bottom: 8px; color: #fff; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 32px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0f3460;
      color: #fff;
      font-size: 15px;
      outline: none;
      margin-bottom: 16px;
    }
    input:focus { border-color: #e94560; }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #c73550; }
    .error { color: #e94560; font-size: 13px; margin-top: 12px; min-height: 20px; }
    #setup { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Probate Assistant</h1>

    <div id="login-view">
      <p class="subtitle">Enter your password to continue</p>
      <form id="login-form">
        <input type="password" id="pw" placeholder="Password" autofocus>
        <button type="submit">Unlock</button>
      </form>
    </div>

    <div id="setup-view">
      <p class="subtitle">First time setup — choose a password</p>
      <form id="setup-form">
        <input type="password" id="new-pw" placeholder="Choose a password" autofocus>
        <input type="password" id="new-pw2" placeholder="Confirm password">
        <button type="submit">Set Password & Continue</button>
      </form>
    </div>

    <p class="error" id="err"></p>
  </div>

  <script>
    const PASSWORD_KEY = "probate_pw_hash";

    async function sha256(str) {
      const buf = await crypto.subtle.digest("SHA-256",
        new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf))
        .map(b => b.toString(16).padStart(2, "0")).join("");
    }

    function waitForServer(timeoutMs) {
      return new Promise((resolve, reject) => {
        const start = Date.now();
        const check = () => {
          if (Date.now() - start > timeoutMs) {
            reject(new Error("timeout"));
            return;
          }
          fetch("http://localhost:52845/counties")
            .then(r => { if (r.ok) resolve(); else setTimeout(check, 300); })
            .catch(() => setTimeout(check, 300));
        };
        check();
      });
    }

    // Listen for status updates from Electron main process
    window.__statusUpdate = (msg) => {
      const err = document.getElementById("err");
      err.style.color = "#aaa";
      err.textContent = msg;
    };

    window.__flaskFailed = (msg) => {
      const err = document.getElementById("err");
      err.style.color = "#e94560";
      err.textContent = msg;
      err.style.fontSize = "12px";
      const btn = document.querySelector("button");
      if (btn) { btn.textContent = "Unlock"; btn.disabled = false; }
    };

    async function unlock() {
      const err = document.getElementById("err");
      err.textContent = "Starting app...";
      err.style.color = "#aaa";
      try {
        await waitForServer(15000);
        window.location.href = "http://localhost:52845";
      } catch (e) {
        err.style.color = "#e94560";
        err.textContent = "Server didn't start. macOS may be blocking it — try right-clicking the app icon and choosing \"Open\" instead of double-clicking.";
        err.style.fontSize = "12px";
        const btn = document.querySelector("button");
        if (btn) { btn.textContent = "Retry"; btn.disabled = false; }
      }
    }

    // Check if password exists
    const savedHash = localStorage.getItem(PASSWORD_KEY);

    if (savedHash) {
      document.getElementById("login-view").style.display = "block";
      document.getElementById("setup-view").style.display = "none";

      document.getElementById("login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const pw = document.getElementById("pw").value;
        const hash = await sha256(pw);
        if (hash === savedHash) {
          unlock();
        } else {
          document.getElementById("err").textContent = "Incorrect password";
          document.getElementById("pw").value = "";
          document.getElementById("pw").focus();
        }
      });
    } else {
      document.getElementById("login-view").style.display = "none";
      document.getElementById("setup-view").style.display = "block";

      document.getElementById("setup-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const pw = document.getElementById("new-pw").value;
        const pw2 = document.getElementById("new-pw2").value;
        const err = document.getElementById("err");

        if (pw.length < 4) { err.textContent = "Password must be at least 4 characters"; return; }
        if (pw !== pw2) { err.textContent = "Passwords don't match"; return; }

        const hash = await sha256(pw);
        localStorage.setItem(PASSWORD_KEY, hash);
        unlock();
      });
    }
  </script>
</body>
</html>

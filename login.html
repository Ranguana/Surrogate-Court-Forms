<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login — Probate HQ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 48px 40px;
      width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      text-align: center;
    }
    h1 { font-size: 20px; margin-bottom: 8px; color: #fff; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 32px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0f3460;
      color: #fff;
      font-size: 15px;
      outline: none;
      margin-bottom: 16px;
    }
    input:focus { border-color: #e94560; }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #c73550; }
    .error { color: #e94560; font-size: 13px; margin-top: 12px; min-height: 20px; }
    #setup { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Probate HQ</h1>

    <div id="login-view">
      <p class="subtitle">Enter your password to continue</p>
      <form id="login-form">
        <input type="password" id="pw" placeholder="Password" autofocus>
        <button type="submit">Unlock</button>
      </form>
    </div>

    <div id="setup-view">
      <p class="subtitle">First time setup — choose a password</p>
      <form id="setup-form">
        <input type="password" id="new-pw" placeholder="Choose a password" autofocus>
        <input type="password" id="new-pw2" placeholder="Confirm password">
        <button type="submit">Set Password & Continue</button>
      </form>
    </div>

    <p class="error" id="err"></p>
  </div>

  <script>
    let serverReady = false;
    let serverFailed = false;

    function waitForServer(timeoutMs) {
      return new Promise((resolve, reject) => {
        if (serverReady) { resolve(); return; }
        if (serverFailed) { reject(new Error("failed")); return; }
        const start = Date.now();
        const check = () => {
          if (serverFailed) { reject(new Error("failed")); return; }
          if (Date.now() - start > timeoutMs) {
            reject(new Error("timeout"));
            return;
          }
          fetch("http://localhost:52845/counties")
            .then(r => { if (r.ok) { serverReady = true; resolve(); } else setTimeout(check, 500); })
            .catch(() => setTimeout(check, 500));
        };
        check();
      });
    }

    window.__statusUpdate = (msg) => {
      const err = document.getElementById("err");
      err.style.color = "#aaa";
      err.textContent = msg;
    };

    window.__flaskFailed = (msg) => {
      serverFailed = true;
      const err = document.getElementById("err");
      err.style.color = "#e94560";
      err.textContent = msg;
      err.style.fontSize = "12px";
      const btn = document.querySelector("button");
      if (btn) { btn.textContent = "Unlock"; btn.disabled = false; }
    };

    async function unlock() {
      const err = document.getElementById("err");
      err.style.color = "#aaa";
      err.textContent = "Starting app — first launch may take a few minutes...";
      const btn = document.querySelector("button");
      if (btn) { btn.disabled = true; btn.textContent = "Loading..."; }
      try {
        await waitForServer(300000);
        window.location.href = "http://localhost:52845";
      } catch (e) {
        err.style.color = "#e94560";
        if (serverFailed) {
          err.textContent = "Server failed to start. Check that Python 3 is installed (python.org/downloads) and relaunch.";
        } else {
          err.textContent = "Server didn't start in time. Try relaunching the app.";
        }
        err.style.fontSize = "12px";
        if (btn) { btn.textContent = "Retry"; btn.disabled = false; }
      }
    }

    // Init: check for local password via IPC
    (async () => {
      const hasPassword = await window.auth.hasPassword();

      if (hasPassword) {
        document.getElementById("login-view").style.display = "block";
        document.getElementById("setup-view").style.display = "none";

        document.getElementById("login-form").addEventListener("submit", async (e) => {
          e.preventDefault();
          const pw = document.getElementById("pw").value;
          const result = await window.auth.login(pw);
          if (result.ok) {
            unlock();
          } else {
            document.getElementById("err").textContent = "Incorrect password";
            document.getElementById("pw").value = "";
            document.getElementById("pw").focus();
          }
        });
      } else {
        document.getElementById("login-view").style.display = "none";
        document.getElementById("setup-view").style.display = "block";

        document.getElementById("setup-form").addEventListener("submit", async (e) => {
          e.preventDefault();
          const pw = document.getElementById("new-pw").value;
          const pw2 = document.getElementById("new-pw2").value;
          const err = document.getElementById("err");

          if (pw.length < 4) { err.textContent = "Password must be at least 4 characters"; return; }
          if (pw !== pw2) { err.textContent = "Passwords don't match"; return; }

          const result = await window.auth.setupPassword(pw);
          if (result.ok) {
            unlock();
          } else {
            err.textContent = result.error;
          }
        });
      }
    })();
  </script>
</body>
</html>

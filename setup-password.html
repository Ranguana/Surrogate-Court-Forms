<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Set Password — Probate HQ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 48px 40px;
      width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      text-align: center;
    }
    h1 { font-size: 20px; margin-bottom: 8px; color: #fff; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 32px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0f3460;
      color: #fff;
      font-size: 15px;
      outline: none;
      margin-bottom: 16px;
    }
    input:focus { border-color: #e94560; }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #c73550; }
    .error { color: #e94560; font-size: 13px; margin-top: 12px; min-height: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Probate HQ</h1>
    <p class="subtitle">First time setup — choose a password</p>
    <form id="form">
      <input type="password" id="pw" placeholder="Choose a password" autofocus>
      <input type="password" id="pw2" placeholder="Confirm password">
      <button type="submit">Set Password & Continue</button>
    </form>
    <p class="error" id="err"></p>
  </div>
  <script>
    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const pw = document.getElementById("pw").value;
      const pw2 = document.getElementById("pw2").value;
      const err = document.getElementById("err");
      const btn = document.querySelector("button");

      if (pw !== pw2) {
        err.textContent = "Passwords don't match";
        return;
      }
      if (pw.length < 4) {
        err.textContent = "Password must be at least 4 characters";
        return;
      }

      btn.textContent = "Loading...";
      btn.disabled = true;
      err.textContent = "";

      try {
        const result = await window.auth.setupPassword(pw);
        if (!result.ok) {
          err.textContent = result.error;
          btn.textContent = "Set Password & Continue";
          btn.disabled = false;
        }
      } catch (ex) {
        err.textContent = "Error: " + ex.message;
        btn.textContent = "Set Password & Continue";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
